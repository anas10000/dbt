name: CI - Validate Pull Request

on:
  pull_request:
    branches: [dev, uat, main]

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Install dbt packages
        run: dbt deps
        working-directory: mon_projet

      - name: Determine target environment
        id: target
        run: |
          if [ "${{ github.base_ref }}" = "dev" ]; then echo "target=dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" = "uat" ]; then echo "target=uat" >> $GITHUB_OUTPUT
          else echo "target=prod" >> $GITHUB_OUTPUT
          fi

      - name: dbt build (validation only)
        run: dbt build --target ${{ steps.target.outputs.target }}
        working-directory: mon_projet
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}