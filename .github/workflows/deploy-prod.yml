name: Deploy to PROD

on:
  push:
    branches: [main]

jobs:
  dbt-deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install dbt-snowflake
      - run: dbt deps
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "mon_projet:" > ~/.dbt/profiles.yml
          echo "  target: prod" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    prod:" >> ~/.dbt/profiles.yml
          echo "      type: snowflake" >> ~/.dbt/profiles.yml
          echo "      account: ${{ secrets.DBT_ACCOUNT }}" >> ~/.dbt/profiles.yml
          echo "      user: ${{ secrets.DBT_USER }}" >> ~/.dbt/profiles.yml
          echo "      password: \"${{ secrets.DBT_PASSWORD }}\"" >> ~/.dbt/profiles.yml
          echo "      role: ACCOUNTADMIN" >> ~/.dbt/profiles.yml
          echo "      database: DWH" >> ~/.dbt/profiles.yml
          echo "      warehouse: DWH" >> ~/.dbt/profiles.yml
          echo "      schema: PUBLIC" >> ~/.dbt/profiles.yml
          echo "      threads: 1" >> ~/.dbt/profiles.yml
      - run: dbt build --target prod